# Optional: set PR title to Conventional Commits (feat:, fix:, …) for changelog & semver.
name: Conventional Commits (PR title)

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]
    branches: [main]

permissions:
  pull-requests: read
  statuses: write
  checks: write

concurrency:
  group: conventional-pr-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  check:
    name: Validate
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Conventional Commits
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            test
            build
            ci
            chore
            perf
            revert
            release
          requireScope: false
