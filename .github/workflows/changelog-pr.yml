# Regenerates CHANGELOG.md from Conventional Commits and opens a PR.
name: Changelog (PR)

on:
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: changelog-pr
  cancel-in-progress: true

jobs:
  pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate CHANGELOG
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: -v
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update CHANGELOG.md"
          title: "chore: update CHANGELOG.md"
          body: |
            Regenerated with [git-cliff](https://github.com/orhun/git-cliff) from Conventional Commits on `main`.

            Review [docs/RELEASING.md](https://github.com/${{ github.repository }}/blob/main/docs/RELEASING.md) before merge.
          branch: chore/changelog-ci-${{ github.run_id }}
          delete-branch: true
