# git-cliff — https://git-cliff.org/docs/configuration
# Conventional Commits → CHANGELOG.md (local: `make changelog`, CI: workflows)

[remote.github]
owner = "zatrano"
repo  = "zatrano"

[changelog]
header = """
# Changelog

All notable changes to this project are documented in this file.

The format follows [Conventional Commits](https://www.conventionalcommits.org/en/v1.0.0/).
Entries are generated with [git-cliff](https://github.com/orhun/git-cliff).

"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
filter_commits = false
split_commits = false
protect_breaking_commits = true
tag_pattern = "v[0-9].*"
sort_commits = "oldest"

commit_parsers = [
    { message = "^Merge", skip = true },
    { message = "^feat(\\(.+\\))?!?:", group = "Features" },
    { message = "^feat", group = "Features" },
    { message = "^fix(\\(.+\\))?!?:", group = "Bug Fixes" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^doc", group = "Documentation" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactor" },
    { message = "^test", group = "Testing" },
    { message = "^build", group = "Build" },
    { message = "^ci", group = "CI" },
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore", group = "Chore" },
    { message = "^revert", group = "Revert" },
    { message = "^style", group = "Style" },
    { message = ".*", group = "Other" },
]

[bump]
features_always_bump_minor = false
breaking_always_bump_major = true
initial_tag = "v0.0.0"
