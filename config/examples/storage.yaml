# Storage Configuration Example
# Place this in your config file (e.g., config/app.yaml or config/dev.yaml)

storage:
  # Driver type: "local", "s3", "minio", "r2"
  driver: local

  # Local disk configuration
  local:
    # Root directory for storing files
    root: storage/app
    # Where public files are symlinked to (within public/ directory)
    public_root: public/storage
    # URL prefix for accessing public files
    public_url: /storage

  # S3-compatible storage configuration
  s3:
    # AWS region (or region for S3-compatible service)
    region: us-east-1
    # S3 bucket name
    bucket: my-app-uploads
    # Custom endpoint (leave empty for AWS S3)
    # MinIO:     https://minio.example.com:9000
    # Cloudflare R2: https://your-account.r2.cloudflarestorage.com
    endpoint: ""
    # AWS/S3 credentials
    access_key: "${AWS_ACCESS_KEY_ID}"
    secret_key: "${AWS_SECRET_ACCESS_KEY}"
    # Custom public URL (optional)
    # If not set, will use default S3 URL format
    public_url: https://cdn.example.com/uploads
    # Use path-style URLs (required for MinIO)
    # true: https://s3.amazonaws.com/bucket/key
    # false: https://bucket.s3.amazonaws.com/key (default for AWS)
    use_path_style: false

  # Private storage (not accessible via web)
  private:
    enabled: true
    root: storage/private

